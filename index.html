<style>

  body{font-family:'Fira Code','Courier New',monospace;background:#fefae0;color:#3e2723;min-height:100vh;-webkit-font-smoothing:antialiased}
  #root{max-width:740px;margin:0 auto;padding:24px 16px}
  .item-pill{font-family:'Bitter',Georgia,serif;font-weight:900;font-size:14px;color:#1b0e00;background:linear-gradient(135deg,rgba(255,236,179,.6),rgba(255,224,130,.4));padding:1px 8px 2px;border-radius:5px;border-bottom:2px solid rgba(230,81,0,.25);letter-spacing:.3px;display:inline-flex;align-items:center;gap:5px;line-height:1.4;vertical-align:middle}
  .item-pill.animal{background:linear-gradient(135deg,rgba(215,204,200,.6),rgba(188,170,164,.35));border-bottom-color:rgba(78,52,46,.25)}
  .item-pill img{width:24px;height:24px;image-rendering:pixelated;vertical-align:middle;flex-shrink:0}
  .name-tag{display:inline-block;background:#fff9c4;border:1px solid #f9a825;border-radius:4px;padding:0 5px;margin-right:4px;font-size:11px;font-weight:700;color:#e65100;font-family:'Fira Code',monospace}
  .type-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:1px 6px;border-radius:4px;color:#fff;flex-shrink:0;font-family:'Fira Code',monospace}
  .char-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .12s ease;position:relative;text-align:left;width:100%}
  .section-hdr{width:100%;padding:14px 18px;border:none;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'Fira Code',monospace}
  .section-hdr .title{font-family:'Bitter',Georgia,serif;font-weight:900;letter-spacing:.5px}
  .section-hdr .badge{font-size:11px;color:#fff;padding:2px 8px;border-radius:10px;font-weight:700;font-family:'Fira Code',monospace}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .2s ease-out}
  .char-card{border-radius:12px;overflow:hidden;border:2px solid #d7ccc8;background:#fffef7;margin-bottom:12px}
  .char-card-hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;background:linear-gradient(135deg,#f5f5f5,#eeeeee)}
  .char-card-hdr img{width:48px;height:48px;image-rendering:pixelated;border-radius:8px;border:2px solid #d7ccc8;background:#fff}
  .gift-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid #f5f5f5}
  .gift-row:last-child{border-bottom:none}
  .gift-row img{width:24px;height:24px;image-rendering:pixelated;flex-shrink:0}
  .gift-row .g-name{font-family:'Bitter',Georgia,serif;font-weight:700;font-size:13px;color:#3e2723}
  .gift-row .g-src{font-size:10px;color:#8d6e63;margin-top:1px}
  .love-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
  .wiki-img{image-rendering:pixelated}
</style>

// Reliable wiki image URL via Special:FilePath redirect (always resolves correctly)
function wikiImg(filename) {
  return `https://stardewvalleywiki.com/mediawiki/index.php?title=Special:FilePath&file=${encodeURIComponent(filename)}`;
}
function itemUrl(name) {
  return wikiImg(name.replace(/ /g, '_') + '.png');
}
function charUrl(name) {
  return wikiImg(name + '.png');
}

];
const ALL_CHARACTERS=Object.keys(CHARS).sort();
const SK="stardew-done-v5";
function ld(){try{const r=localStorage.getItem(SK);return r?new Set(JSON.parse(r)):new Set()}catch{return new Set()}}
function sv(s){try{localStorage.setItem(SK,JSON.stringify([...s]))}catch{}}

// Generic items starting with "Any" won't have wiki icons
const Ico=({name,size=24})=>{
  if(!name||name.startsWith("Any"))return null;
  return <img className="wiki-img" src={itemUrl(name)} alt={name} style={{width:size,height:size}} loading="lazy"
    onError={e=>{e.target.style.display='none'}}/>;
};
const Port=({name,size=48})=><img className="wiki-img" src={charUrl(name)} alt={name}
  style={{width:size,height:size,borderRadius:8,border:"2px solid #d7ccc8",background:"#fff"}} loading="lazy"
  onError={e=>{e.target.style.display='none'}}/>;
const NT=({name})=><span className="name-tag">{name}</span>;
const ItemPill=({name,variant})=><span className={`item-pill${variant==="animal"?" animal":""}`}><Ico name={name}/>{name}</span>;

function Section({bg,borderColor,accentColor,badgeBg,emoji,title,badge,isOpen,toggle,children}){
  return <div style={{marginBottom:16,borderRadius:12,overflow:"hidden",border:`2px solid ${borderColor}`,background:"#fffef7",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
    <button className="section-hdr" onClick={toggle} style={{background:bg}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>{emoji}</span>
        <span className="title" style={{fontSize:18,color:accentColor}}>{title}</span>
        <span className="badge" style={{background:badgeBg}}>{badge}</span>
      </div>
      <span style={{fontSize:18,color:accentColor,transform:isOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s",display:"inline-block"}}>▼</span>
    </button>
    {isOpen&&<div className="fade-in" style={{padding:"12px 14px"}}>{children}</div>}
  </div>;
}

function App(){
  const[tab,setTab]=useState("gifts");
  const[filter,setFilter]=useState("all");
  const[done,setDone]=useState(ld);
  const[expSeason,setExpSeason]=useState(null);
  const[showAnimal,setShowAnimal]=useState(true);
  const[showOthers,setShowOthers]=useState(false);
  const[openChar,setOpenChar]=useState(null);
  const[charSearch,setCharSearch]=useState("");
  const ud=n=>{setDone(n);sv(n)};
  const tc=n=>{const x=new Set(done);x.has(n)?x.delete(n):x.add(n);ud(x)};
  const rem=ALL_CHARACTERS.length-done.size;
  const fg=g=>g.map(x=>{if(x.type==="note")return x;const r=x.who.filter(w=>w==="—"||!done.has(w));return r.length?{...x,who:r}:null}).filter(Boolean);
  const fa=ANIMAL_PRODUCTS.map(a=>{const r=a.who.filter(w=>w==="Almost everyone"||!done.has(w));return r.length?{...a,who:r}:null}).filter(Boolean);
  const fne=NO_EASY_GIFT.filter(v=>!done.has(v.name));
  const filteredChars=useMemo(()=>{
    const s=charSearch.toLowerCase();
    return ALL_CHARACTERS.filter(n=>!done.has(n)&&(!s||n.toLowerCase().includes(s)));
  },[charSearch,done]);

  return <div>
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:13,letterSpacing:3,textTransform:"uppercase",color:"#8d6e63",marginBottom:4}}>Stardew Valley</div>
      <h1 style={{fontFamily:"'Bitter',Georgia,serif",fontSize:28,fontWeight:900,margin:"0 0 6px 0",color:"#33691e"}}>🎁 Loved Gifts Guide</h1>
      <div style={{fontSize:12,color:"#8d6e63"}}>Crops, forageables &amp; animal products — no fruit trees</div>
    </div>

    <div style={{display:"flex",marginBottom:20,borderRadius:10,overflow:"hidden",border:"2px solid #5d4037"}}>
      {[{id:"gifts",l:"🗓️ Season"},{id:"characters",l:"👤 By Char"},{id:"tracker",l:"✅ Tracker"}].map((t,i,a)=>
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          flex:1,padding:"10px 8px",border:"none",borderRight:i<a.length-1?"2px solid #5d4037":"none",
          background:tab===t.id?"#5d4037":"#fefae0",color:tab===t.id?"#fefae0":"#5d4037",
          fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:4,
        }}>{t.l}
          {t.id==="tracker"&&done.size>0&&<span style={{fontSize:10,background:tab===t.id?"#81c784":"#66bb6a",color:"#fff",padding:"1px 6px",borderRadius:8,fontWeight:700}}>{done.size}/{ALL_CHARACTERS.length}</span>}
        </button>
      )}
    </div>

    {/* TRACKER */}
    {tab==="tracker"&&<div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:12,color:"#8d6e63"}}><strong>{rem}</strong> of {ALL_CHARACTERS.length} remaining</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>ud(new Set())} style={{padding:"4px 12px",borderRadius:6,border:"1px solid #ef9a9a",background:"#ffebee",color:"#c62828",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>Reset</button>
          <button onClick={()=>ud(new Set(ALL_CHARACTERS))} style={{padding:"4px 12px",borderRadius:6,border:"1px solid #a5d6a7",background:"#e8f5e9",color:"#2e7d32",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>All Done</button>
        </div>
      </div>
      <div style={{padding:"10px 14px",background:"#fff9c4",borderRadius:10,border:"1px solid #f9a825",marginBottom:16,fontSize:12,color:"#5d4037"}}>
        ☐ = still working on &ensp;·&ensp; ☑ = maxed hearts (hides from other tabs)
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {ALL_CHARACTERS.map(name=>{const d=done.has(name);
          return <button key={name} className="char-btn" onClick={()=>tc(name)} style={{border:d?"1.5px solid #a5d6a7":"1.5px solid #e0e0e0",background:d?"#e8f5e9":"#fff"}}>
            <Port name={name} size={32}/>
            <div style={{width:20,height:20,borderRadius:5,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:d?"2px solid #4caf50":"2px solid #bdbdbd",background:d?"#4caf50":"#fff",transition:"all .12s"}}>
              {d&&<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6L5 9L10 3" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:d?"#9e9e9e":"#3e2723",textDecoration:d?"line-through":"none"}}>{name}</div>
              <div style={{fontSize:10,color:"#8d6e63"}}>{CHARS[name]?.bday}</div>
            </div>
            {d&&<div style={{position:"absolute",top:4,right:6,fontSize:9,color:"#4caf50",fontWeight:700}}>MAX ♥</div>}
          </button>;})}
      </div>
    </div>}

    {/* BY CHARACTER */}
    {tab==="characters"&&<div className="fade-in">
      <input value={charSearch} onChange={e=>setCharSearch(e.target.value)} placeholder="Search characters..." style={{
        width:"100%",padding:"10px 14px",borderRadius:10,border:"2px solid #d7ccc8",background:"#fff",
        fontFamily:"inherit",fontSize:13,marginBottom:16,outline:"none"}}/>
      {done.size>0&&<div style={{textAlign:"center",fontSize:11,color:"#2e7d32",background:"#e8f5e9",padding:"6px 12px",borderRadius:8,marginBottom:14,border:"1px solid #a5d6a7"}}>
        ✅ {done.size} maxed — showing remaining only
      </div>}
      {filteredChars.length===0&&<div style={{textAlign:"center",padding:40,color:"#9e9e9e",fontStyle:"italic"}}>
        {charSearch?"No matches":"All characters maxed! 🎉"}
      </div>}
      {filteredChars.map(name=>{const c=CHARS[name];if(!c)return null;const isOpen=openChar===name;
        return <div key={name} className="char-card">
          <div className="char-card-hdr" onClick={()=>setOpenChar(isOpen?null:name)}>
            <Port name={name}/>
            <div style={{flex:1}}>
              <h3 style={{fontFamily:"'Bitter',Georgia,serif",fontSize:16,fontWeight:900,color:"#3e2723",margin:0}}>{name}</h3>
              <div style={{fontSize:10,color:"#8d6e63",marginTop:2}}>🎂 {c.bday} · {c.loved.length} loved · {c.liked.length} liked</div>
            </div>
            <span style={{fontSize:18,color:"#8d6e63",transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform .2s",display:"inline-block"}}>▼</span>
          </div>
          {isOpen&&<div className="fade-in" style={{padding:"8px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#c62828",textTransform:"uppercase",letterSpacing:1,padding:"6px 0 4px",borderBottom:"1px solid #ffcdd2"}}>❤️ Loved</div>
            {c.loved.map((g,i)=><div key={i} className="gift-row">
              <Ico name={g.n}/>
              <div style={{flex:1}}><div className="g-name">{g.n}</div><div className="g-src">{g.src}</div></div>
              <span className="love-badge" style={{background:"#e53935"}}>love</span>
            </div>)}
            <div style={{fontSize:11,fontWeight:700,color:"#1565c0",textTransform:"uppercase",letterSpacing:1,padding:"10px 0 4px",borderBottom:"1px solid #bbdefb"}}>💙 Liked (easy)</div>
            {c.liked.map((g,i)=><div key={i} className="gift-row">
              <Ico name={g.n}/>
              <div style={{flex:1}}><div className="g-name">{g.n}</div><div className="g-src">{g.src}</div></div>
              <span className="love-badge" style={{background:"#1e88e5"}}>like</span>
            </div>)}
          </div>}
        </div>;})}
    </div>}

    {/* SEASON GIFTS */}
    {tab==="gifts"&&<div className="fade-in">
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20,flexWrap:"wrap"}}>
        {["all","crop","forage"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{
          padding:"6px 16px",border:filter===f?"2px solid #5d4037":"2px solid #d7ccc8",borderRadius:20,
          background:filter===f?"#5d4037":"transparent",color:filter===f?"#fefae0":"#5d4037",
          fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",textTransform:"uppercase",letterSpacing:1,
        }}>{f==="all"?"All":f==="crop"?"🌾 Crops":"🍃 Forage"}</button>)}
      </div>
      {done.size>0&&<div style={{textAlign:"center",fontSize:11,color:"#2e7d32",background:"#e8f5e9",padding:"6px 12px",borderRadius:8,marginBottom:14,border:"1px solid #a5d6a7"}}>
        ✅ {done.size} maxed <span onClick={()=>setTab("tracker")} style={{textDecoration:"underline",cursor:"pointer",fontWeight:700,marginLeft:6}}>manage</span>
      </div>}
      {fa.length>0&&<Section emoji="🐄" title="Animal Products" badge="year-round"
        bg="linear-gradient(135deg,#efebe9 0%,#d7ccc8 50%,#bcaaa4 100%)" borderColor="#8d6e63" accentColor="#4e342e" badgeBg="#6d4c41"
        isOpen={showAnimal} toggle={()=>setShowAnimal(!showAnimal)}>
        {fa.map((a,i)=><div key={i} style={{padding:"10px 12px",marginBottom:6,borderRadius:8,background:"linear-gradient(135deg,#fafafa,#f5f0eb)",border:"1px solid #d7ccc8"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span className="type-badge" style={{background:"#6d4c41"}}>ANIMAL</span>
            <ItemPill name={a.item} variant="animal"/>
            <span style={{fontSize:12,color:"#6d4c41"}}>→ {a.who.map((n,j)=><NT key={j} name={n}/>)}</span>
          </div>
          <div style={{fontSize:11,color:"#5d4037",marginTop:4,fontWeight:600}}>{a.source}</div>
          <div style={{fontSize:11,color:"#8d6e63",marginTop:2}}>{a.note}</div>
        </div>)}
      </Section>}
      {SEASONS.map(s=>{const isO=expSeason===s.name||expSeason===null;const sg=fg(s.gifts);
        const fl=sg.filter(g=>filter==="all"||g.type===filter||g.type==="note");
        const rc=sg.filter(g=>g.type!=="note").length;
        if(rc===0&&sg.filter(g=>g.type==="note").length===0)return null;
        return <Section key={s.name} emoji={s.emoji} title={s.name} badge={`${rc} gift${rc!==1?"s":""}`}
          bg={s.bg} borderColor={s.border} accentColor={s.accent} badgeBg={s.accent}
          isOpen={isO} toggle={()=>setExpSeason(expSeason===s.name?null:s.name)}>
          {fl.length===0?<div style={{padding:12,fontSize:13,color:"#9e9e9e",textAlign:"center",fontStyle:"italic"}}>{filter==="all"?"All maxed!":"No "+filter+" items"}</div>
          :fl.map((g,i)=><div key={i} style={{padding:"10px 12px",marginBottom:6,borderRadius:8,
            background:g.type==="note"?"repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(0,0,0,.015) 8px,rgba(0,0,0,.015) 16px)":g.type==="crop"?"#f1f8e9":"#fce4ec20",
            border:g.type==="note"?"1px dashed #bdbdbd":`1px solid ${g.type==="crop"?"#c5e1a5":"#f8bbd0"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span className="type-badge" style={{background:g.type==="crop"?"#7cb342":g.type==="forage"?"#e91e63":"#9e9e9e"}}>{g.type==="crop"?"CROP":g.type==="forage"?"FORAGE":"NOTE"}</span>
              <ItemPill name={g.item}/>
              {g.who.length>0&&g.who[0]!=="—"&&<span style={{fontSize:12,color:"#6d4c41"}}>→ {g.who.map((n,j)=><NT key={j} name={n}/>)}</span>}
            </div>
            <div style={{fontSize:11,color:"#795548",marginTop:4,fontStyle:g.type==="note"?"italic":"normal"}}>{g.note}</div>
          </div>)}
        </Section>;})}
      <div style={{margin:"24px 0 16px",padding:"16px 18px",borderRadius:12,background:"linear-gradient(135deg,#fff9c4,#fff176)",border:"2px solid #f9a825"}}>
        <div style={{fontFamily:"'Bitter',Georgia,serif",fontSize:15,fontWeight:900,marginBottom:8,color:"#e65100"}}>⭐ MVP Items</div>
        <div style={{fontSize:12,lineHeight:2,color:"#5d4037"}}>
          {[["Pumpkin","3 villagers"],["Goat Cheese","Leah + Robin"],["Hot Pepper","Shane + Lewis, regrows"],["Duck Feather","Elliott + Leo"],["Fairy Rose","Evelyn + Jas"],["Amethyst","Clint, Dwarf, Emily (Crystalarium)"],["Rabbit's Foot","Universal love (not Penny)"]].map(([n,d],i)=>
            <div key={i} style={{display:"flex",alignItems:"center",gap:6}}><Ico name={n} size={20}/><strong>{n}</strong> — {d}</div>
          )}
        </div>
      </div>
      {fne.length>0&&<Section emoji="🔧" title="Cooking / Mining / Artisan" badge={String(fne.length)}
        bg="linear-gradient(135deg,#efebe9,#d7ccc8)" borderColor="#bdbdbd" accentColor="#5d4037" badgeBg="#795548"
        isOpen={showOthers} toggle={()=>setShowOthers(!showOthers)}>
        {fne.map((v,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",marginBottom:4,borderRadius:8,background:"#fafafa",border:"1px solid #eee"}}>
          <Ico name={v.giftName} size={28}/>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontFamily:"'Bitter',Georgia,serif",fontSize:13,fontWeight:700,color:"#5d4037"}}>{v.name}</span>
              <span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,padding:"1px 5px",borderRadius:3,
                background:v.method==="mining"?"#7986cb":v.method==="cooking"?"#ffb74d":v.method==="artisan"?"#81c784":"#ce93d8",color:"#fff"}}>{v.method}</span>
            </div>
            <div style={{fontSize:11,color:"#8d6e63",marginTop:2}}>{v.tip}</div>
          </div>
        </div>)}
      </Section>}
    </div>}

    <div style={{textAlign:"center",fontSize:10,color:"#bcaaa4",marginTop:24,paddingBottom:20}}>
      Based on Stardew Valley v1.6 · Icons from <a href="https://stardewvalleywiki.com" style={{color:"#8d6e63"}}>Stardew Valley Wiki</a> (CC BY-NC-SA)
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
